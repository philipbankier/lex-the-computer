services:
  # --- Frontend ---
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Product API (FastAPI) ---
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    environment:
      - AGENT_HARNESS=${AGENT_HARNESS:-hermes}
      - HERMES_API_URL=http://hermes:8642
      - HERMES_API_KEY=${HERMES_API_KEY:-lex-local-dev}
      - HERMES_DATA_DIR=/data/hermes
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/lex
      - REDIS_URL=redis://redis:6379
      - HONCHO_BASE_URL=http://honcho-api:8000
      - WORKSPACE_DIR=/data/workspace
    volumes:
      - workspace:/data/workspace
      - hermes_data:/data/hermes:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      hermes:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Agent Harness: Hermes (default) ---
  hermes:
    build:
      context: .
      dockerfile: docker/hermes/Dockerfile.hermes
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - API_SERVER_ENABLED=true
      - API_SERVER_PORT=8642
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${HERMES_API_KEY:-lex-local-dev}
    volumes:
      - workspace:/data/workspace
      - hermes_data:/root/.hermes
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8642/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Memory: Honcho ---
  honcho-api:
    build:
      context: https://github.com/plastic-labs/honcho.git
    command: ["python", "-m", "src.main"]
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/honcho
      - LLM_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AUTH_USE_AUTH=false
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  honcho-deriver:
    build:
      context: https://github.com/plastic-labs/honcho.git
    command: ["python", "-m", "src.deriver"]
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/honcho
      - LLM_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      - honcho-api
    restart: unless-stopped

  # --- Infrastructure ---
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: lex
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CADDY_EMAIL=${CADDY_EMAIL:-}
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-localhost}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  workspace:
  hermes_data:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
