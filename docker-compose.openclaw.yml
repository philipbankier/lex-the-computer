# OpenClaw mode: swaps Hermes for OpenClaw gateway as agent harness.
# Usage: docker compose -f docker-compose.yml -f docker-compose.openclaw.yml up

services:
  hermes:
    deploy:
      replicas: 0

  api:
    environment:
      - AGENT_HARNESS=openclaw
      - OPENCLAW_GATEWAY_URL=ws://openclaw:18789
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-dev-token}
    volumes:
      - workspace:/data/workspace
      - openclaw_data:/data/hermes:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      openclaw:
        condition: service_started

  openclaw:
    image: node:24-slim
    command: ["npx", "-y", "openclaw", "gateway"]
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-dev-token}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - openclaw_data:/home/node/.openclaw
      - workspace:/data/workspace
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:18789/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  openclaw_data:
