version: "3.9"
services:
  web:
    build: .
    command: pnpm --filter @lex/web dev
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=development
    depends_on:
      - core
    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./:/app
      - web-node-modules:/app/packages/web/node_modules

  core:
    build: .
    command: pnpm --filter @lex/core dev
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -fsS http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./:/app
      - core-node-modules:/app/packages/core/node_modules

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:latest
    ports:
      - "4000:4000"
    volumes:
      - ./deploy/litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml"]
    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -fsS http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CADDY_EMAIL=${CADDY_EMAIL}
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - core

volumes:
  pgdata: {}
  redisdata: {}
  caddy_data: {}
  caddy_config: {}
  web-node-modules: {}
  core-node-modules: {}

