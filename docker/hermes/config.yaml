# Hermes Agent — default Lex configuration for Z.ai GLM 5.1
# Overrides via environment variables take precedence.

model: glm-5.1

# Custom API base for Z.ai (OpenAI-compatible endpoint)
# Can be overridden by ZAI_API_BASE env var
api_base: https://open.bigmodel.cn/api/paas/v4

terminal:
  backend: docker

approvals:
  mode: "off"

compression:
  threshold: 0.7

api_server:
  enabled: true
  host: "0.0.0.0"
  port: 8642
